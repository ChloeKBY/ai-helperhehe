<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Vivian</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    #sprite {
      width: 100%;
      display: block;
      -webkit-app-region: drag; /* drag the window from the character */
      cursor: pointer;
    }

    /* Speech bubble that appears above the character with her reply */
    #speechBubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      min-width: 140px;
      max-width: 220px;
      background: rgba(20, 15, 25, 0.92);
      color: #e8dfff;
      font-family: Georgia, serif;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      -webkit-app-region: no-drag;
      display: none;
    }
    #speechBubble.visible {
      display: block;
    }
    /* little tail pointing down at the character */
    #speechBubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(20, 15, 25, 0.92);
    }

    /* Input box that appears when you click the character */
    #inputBox {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      -webkit-app-region: no-drag;
      display: none;
    }
    #inputBox.visible {
      display: flex;
    }
    #chatInput {
      flex: 1;
      background: rgba(20, 15, 25, 0.95);
      color: #e8dfff;
      border: 1px solid #4a3a5a;
      border-radius: 4px;
      padding: 6px 8px;
      font-family: Georgia, serif;
      font-size: 13px;
      outline: none;
    }

    #wrapper {
      position: relative;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="speechBubble"></div>
    <div id="inputBox">
      <input id="chatInput" type="text" placeholder="Ask Vivian..." autofocus />
    </div>
    <img id="sprite" src="../../assets/pngtuber/idle.png" alt="Vivian" />
  </div>

  <script src="renderer.js"></script>
</body>
</html>
