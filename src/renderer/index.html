<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Vivian</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      user-select: none;
      height: 100%;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Reserved space ABOVE the sprite, inside the actual window bounds,
       so the bubble/input never get clipped off the top of the window
       (a bug in an earlier version — they were positioned above y=0). */
    #stage {
      flex: 0 0 110px;
      position: relative;
    }

    #sprite {
      flex: 1;
      width: 100%;
      object-fit: contain;
      object-position: bottom;
      -webkit-app-region: drag; /* drag the window from the character */
      cursor: pointer;
    }

    #speechBubble {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 140px;
      max-width: 260px;
      background: rgba(20, 15, 25, 0.92);
      color: #e8dfff;
      font-family: Georgia, serif;
      font-size: 13px;
      line-height: 1.4;
      padding: 8px 10px;
      border-radius: 8px;
      -webkit-app-region: no-drag;
      display: none;
    }
    #speechBubble.visible {
      display: block;
    }
    #speechBubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: rgba(20, 15, 25, 0.92);
    }

    #inputBox {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      -webkit-app-region: no-drag;
      display: none;
    }
    #inputBox.visible {
      display: flex;
    }
    #chatInput {
      flex: 1;
      background: #1a1420; /* solid, not translucent — keeps text high-contrast */
      color: #ffffff;
      caret-color: #ffffff;
      border: 1px solid #7a5a9a;
      border-radius: 4px;
      padding: 7px 9px;
      font-family: Georgia, serif;
      font-size: 14px;
      outline: none;
    }
    #chatInput::placeholder {
      color: #a898c0;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="stage">
      <div id="speechBubble"></div>
      <div id="inputBox">
        <input id="chatInput" type="text" placeholder="Ask Vivian..." autofocus />
      </div>
    </div>
    <img id="sprite" src="../../assets/pngtuber/idle.png" alt="Vivian" />
  </div>

  <script src="renderer.js"></script>
</body>
</html>
