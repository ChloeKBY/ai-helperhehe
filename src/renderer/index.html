<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Evie</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      user-select: none;
      height: 100%;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Reserved space ABOVE the sprite, inside the actual window bounds,
       so the bubble/input never get clipped off the top of the window. */
    #stage {
      flex: 0 0 150px;
      position: relative;
    }

    #sprite {
      flex: 1;
      width: 100%;
      object-fit: contain;
      object-position: bottom;
      cursor: pointer;
    }

    /* Speech bubble: white with a salmon-orange border, rounded like an
       actual speech bubble (not a plain rectangle), with a matching tail. */
    #speechBubble {
      position: absolute;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      width: 195px;
      max-height: 105px;
      overflow-y: auto;
      background: #ffffff;
      border: 2.5px solid #ff9d76;
      color: #4a3f3a;
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 12px;
      line-height: 1.45;
      padding: 8px 11px;
      border-radius: 18px 18px 18px 6px; /* rounded, one corner pulled in for a speech-bubble feel */
      box-shadow: 0 2px 8px rgba(255, 157, 118, 0.25);
      -webkit-app-region: no-drag;
      display: none;
    }
    #speechBubble.visible {
      display: block;
    }
    /* Tail: two stacked triangles (border color + white fill) so it looks
       like a proper speech-bubble point instead of a plain rectangle tab. */
    #speechBubble::before {
      content: "";
      position: absolute;
      bottom: -11px;
      left: 22px;
      border: 7px solid transparent;
      border-top-color: #ff9d76;
    }
    #speechBubble::after {
      content: "";
      position: absolute;
      bottom: -7.5px;
      left: 24px;
      border: 5.5px solid transparent;
      border-top-color: #ffffff;
    }

    .msg-user {
      color: #d98a5f;
      margin-bottom: 4px;
    }
    .msg-user::before {
      content: "You: ";
      font-weight: 600;
    }
    .msg-vivian {
      color: #4a3f3a;
      margin-bottom: 8px;
    }

    #newChatBtn {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #ff9d76;
      color: #ffffff;
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 10px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      padding: 3px 7px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    #newChatBtn:hover {
      background: #ff8a5c;
    }

    #inputBox {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 185px;
      -webkit-app-region: no-drag;
      display: none;
    }
    #inputBox.visible {
      display: flex;
    }
    #chatInput {
      flex: 1;
      background: #ffffff;
      color: #4a3f3a;
      caret-color: #ff9d76;
      border: 2px solid #ff9d76;
      border-radius: 14px;
      padding: 7px 11px;
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
      outline: none;
      box-shadow: 0 2px 6px rgba(255, 157, 118, 0.2);
    }
    #chatInput::placeholder {
      color: #d9b8a8;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="stage">
      <div id="speechBubble"></div>
      <div id="inputBox">
        <input id="chatInput" type="text" placeholder="Ask Evie..." autofocus />
        <button id="newChatBtn" title="Start a new chat">New</button>
      </div>
    </div>
    <img id="sprite" alt="Evie" />
  </div>

  <script src="renderer.js"></script>
</body>
</html>
